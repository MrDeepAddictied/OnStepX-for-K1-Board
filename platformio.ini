; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .  ; ← 「ソースコードは現在のフォルダ(.)にある」という指定
include_dir = . ; ← ヘッダーファイル(.h)もここにある、という指定

[env:esp32dev]
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	https://github.com/adafruit/Adafruit_Sensor/archive/refs/tags/1.1.9.zip
	https://github.com/adafruit/Adafruit_BME280_Library/archive/refs/tags/2.2.2.zip
	makuna/RTC@2.5.0
	https://github.com/hjd1964/Arduino-DS1820-Temperature-Library.git
	https://github.com/hjd1964/TMC2209.git
	https://github.com/teemuatlut/TMCStepper/archive/refs/heads/master.zip
	https://github.com/hjd1964/OneWire/archive/refs/heads/master.zip
	https://github.com/hjd1964/Arduino-DS2413GPIO-Control-Library/archive/refs/heads/master.zip
	https://github.com/ayushsharma82/ElegantOTA@^3.1.0

lib_compat_mode = strict
